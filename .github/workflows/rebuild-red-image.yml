name: Rebuild red Packstation image

on:
  push:
    paths:
      - ".github/workflows/rebuild-red-image.yml"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Rebuild red image from green master
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          import colorsys

          image_dir = Path('custom_components/dhl_packstation/frontend/images')
          src = image_dir / 'packstation_green.webp'
          dst = image_dir / 'packstation_red.webp'

          image = Image.open(src).convert('RGB')
          pixels = image.load()

          for y in range(image.height):
              for x in range(image.width):
                  r, g, b = pixels[x, y]
                  h, s, v = colorsys.rgb_to_hsv(r / 255, g / 255, b / 255)

                  # Recolor only green neon/glow/reflection pixels.
                  # Yellow/orange locker surfaces remain untouched.
                  if 0.20 <= h <= 0.46 and s >= 0.18 and v >= 0.10 and g > r * 1.05:
                      nr, ng, nb = colorsys.hsv_to_rgb(0.0, min(1.0, max(s, 0.62)), v)
                      pixels[x, y] = (
                          round(nr * 255),
                          round(ng * 255),
                          round(nb * 255),
                      )

          image.save(dst, 'WEBP', quality=98, method=6)

          check = Image.open(dst)
          if check.size != image.size:
              raise RuntimeError(f'Unexpected output size: {check.size} != {image.size}')
          if check.width < 1500 or check.height < 1500:
              raise RuntimeError(f'Source image is unexpectedly small: {check.size}')

          print(f'Created {dst} at {check.size[0]}x{check.size[1]}')
          PY

      - name: Commit rebuilt image
        run: |
          rm .github/workflows/rebuild-red-image.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/dhl_packstation/frontend/images/packstation_red.webp .github/workflows/rebuild-red-image.yml
          git commit -m "Rebuild red Packstation background from green master"
          git push
