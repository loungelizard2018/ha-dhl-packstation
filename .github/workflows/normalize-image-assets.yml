name: Normalize image assets

on:
  push:
    paths:
      - ".github/workflows/normalize-image-assets.yml"

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Convert red background to WebP
        run: |
          sudo apt-get update
          sudo apt-get install -y webp
          cwebp -quiet -q 95 \
            custom_components/dhl_packstation/frontend/images/packstation_red.jpg \
            -o custom_components/dhl_packstation/frontend/images/packstation_red.webp
          rm custom_components/dhl_packstation/frontend/images/packstation_red.jpg
          sed -i 's/packstation_red\.jpg/packstation_red.webp/g' \
            custom_components/dhl_packstation/frontend/dhl-packstation-card.js
          rm .github/workflows/normalize-image-assets.yml
      - name: Commit normalized assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Normalize Packstation backgrounds to WebP"
          git push
